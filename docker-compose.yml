version: "3.9"

services:
  # -----------------------
  # Backend API
  # -----------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: minut-booking-api

    ports:
      - "3000:3000"

    env_file:
      - ./backend/.env.development.local

    environment:
      # IMPORTANT: override localhost for Docker networking
      MONGO_URI: mongodb://mongo:27017

    depends_on:
      - mongo

    volumes:
      - ./backend:/app
      - /app/node_modules

    command: npm run dev

    restart: unless-stopped


  # -----------------------
  # Frontend (React/Vite)
  # -----------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: minut-booking-frontend

    ports:
      - "5173:5173"

    environment:
      VITE_API_BASE_URL: http://localhost:3000/api/v1

    depends_on:
      - api

    volumes:
      - ./frontend:/app
      - /app/node_modules

    command: npm run dev -- --host

    restart: unless-stopped


  # -----------------------
  # MongoDB
  # -----------------------
  mongo:
    image: mongo:8.0

    container_name: minut-booking-mongo

    ports:
      - "27018:27017"

    volumes:
      - mongo-data:/data/db

    restart: unless-stopped


volumes:
  mongo-data: