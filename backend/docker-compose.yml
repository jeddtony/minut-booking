services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGO_URI=mongodb://db:27017
      - DB_NAME=booking_db
      - LOG_FORMAT=dev
      - LOG_DIR=../logs
      - ORIGIN=*
      - CREDENTIALS=true
    ports:
      - '3000:3000'
    depends_on:
      - db
  db:
    image: "mongo:8.0"
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
